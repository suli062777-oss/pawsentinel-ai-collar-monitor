services:
  postgres:
    image: postgres:16-alpine
    container_name: pawroom-postgres
    environment:
      POSTGRES_USER: pawroom
      POSTGRES_PASSWORD: pawroom
      POSTGRES_DB: pawroom
    ports:
      - "5432:5432"
    volumes:
      - pawroom_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawroom -d pawroom"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pawroom-redis
    ports:
      - "6379:6379"
    volumes:
      - pawroom_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pawroom_postgres_data:
  pawroom_redis_data:
