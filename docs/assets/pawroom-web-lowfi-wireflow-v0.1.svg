  <!-- Notes -->
  <g transform="translate(650 1225)">
    <rect fill="#fffdf9" stroke="#d6d0c6" stroke-width="2" x="0" y="0" width="1680" height="220" rx="24"/>
    <text class="title" x="38" y="48" font-size="28">低保真布局原则</text>
    <text class="text" x="38" y="92" font-size="20">1. Web 主体采用「左侧栏 + 主画布」的工作台结构。</text>
    <text class="text" x="38" y="128" font-size="20">2. 看护首页是默认入口；桌面小世界是核心差异化体验；今日回放承接情绪价值和分享。</text>
    <text class="text" x="38" y="164" font-size="20">3. 项圈数据、异常处理、非诊断提示必须保持可见，避免把安全能力包装成纯娱乐。</text>
    <text class="text" x="38" y="200" font-size="20">4. 视觉延续参考库的暖色卡片底层，但当前阶段只画结构框，不进入高保真图形细节。</text>
