<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500">
  <defs>
    <style>
      .bg { fill: #f7f4ef; }
      .title { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif; fill: #1f2933; font-weight: 800; }
      .text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif; fill: #33424d; }
      .muted { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif; fill: #71808a; }
      .frame { fill: #fffdf9; stroke: #c8c2b9; stroke-width: 2.2; }
      .bar { fill: #ece8df; }
      .side { fill: #f3efe7; stroke: #ddd7cb; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #c9d0d4; stroke-width: 1.8; }
      .boxSoft { fill: #f7f8f8; stroke: #d7dcdf; stroke-width: 1.6; }
      .line { stroke: #c7cdd1; stroke-width: 2; stroke-linecap: round; }
      .accent { fill: #ff7a45; }
      .accentStroke { stroke: #ff7a45; stroke-width: 2.4; fill: none; }
      .blueStroke { stroke: #2d8fbd; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .redStroke { stroke: #e2574c; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 8; }
      .grayStroke { stroke: #9aa6ad; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 5 8; }
      .screenTitle { font-size: 27px; font-weight: 800; }
      .small { font-size: 16px; }
      .tiny { font-size: 13px; }
      .pill { fill: #fff5ee; stroke: #ffb28e; stroke-width: 1.6; }
      .badge { fill: #ffffff; stroke: #2d8fbd; stroke-width: 2; }
    </style>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d8fbd"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e2574c"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa6ad"/>
    </marker>
