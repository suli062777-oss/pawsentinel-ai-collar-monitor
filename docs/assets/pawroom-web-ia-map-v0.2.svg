      .muted { fill: #607282; font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif; font-size: 20px; }
      .module { fill: #ffffff; stroke: #2d8fbd; stroke-width: 4; }
      .moduleText { fill: #1f2933; font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif; font-size: 27px; font-weight: 700; }
