      .group { fill: #223846; font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif; font-size: 21px; font-weight: 700; }
      .path { fill: none; stroke: #e2574c; stroke-width: 3.3; stroke-linecap: round; stroke-dasharray: 3 9; }
      .pathLabel { fill: #c84439; font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif; font-size: 20px; font-weight: 700; }
      .pathBg { fill: #fff8f6; stroke: #f3b5ad; stroke-width: 1.5; }
